<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Geometry Dash Clone</title>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        canvas { background: #0072ff; border: 4px solid #fff; box-shadow: 0 0 50px rgba(0,114,255,0.5); }
        #ui { position: absolute; color: white; text-align: center; pointer-events: none; width: 100%; }
        #menu { position: absolute; background: rgba(0,0,0,0.8); padding: 30px; border-radius: 10px; color: white; text-align: center; }
        button { background: #2ecc71; border: none; padding: 15px 40px; font-size: 24px; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; margin-top: 20px; pointer-events: auto; }
        .score { position: absolute; top: 20px; font-size: 30px; font-weight: bold; width: 100%; text-align: center; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div class="score" id="score">0%</div>

    <div id="menu">
        <h1>GEOMETRY DASH</h1>
        <p>Espace ou Clic pour sauter</p>
        <button onclick="startGame()">JOUER</button>
    </div>

    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const menu = document.getElementById("menu");
    const scoreEl = document.getElementById("score");

    canvas.width = 800;
    canvas.height = 400;

    let player, obstacles, gameSpeed, gravity, isGrounded, gameActive, distance, rotation;

    function startGame() {
        player = { x: 100, y: 300, size: 40, vY: 0, jumpPower: -12 };
        obstacles = [];
        gameSpeed = 6;
        gravity = 0.7;
        distance = 0;
        rotation = 0;
        gameActive = true;
        menu.style.display = "none";
        loop();
    }

    let keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
    window.onmousedown = () => keys['Space'] = true;
    window.onmouseup = () => keys['Space'] = false;

    function spawnObstacle() {
        if (Math.random() > 0.98 && (obstacles.length === 0 || obstacles[obstacles.length-1].x < canvas.width - 300)) {
            obstacles.push({ x: canvas.width, w: 40, h: 40 });
        }
    }

    function loop() {
        if (!gameActive) return;

        // Physique du saut
        if (keys['Space'] && isGrounded) {
            player.vY = player.jumpPower;
            isGrounded = false;
        }

        player.vY += gravity;
        player.y += player.vY;

        // Collision Sol
        if (player.y > 300) {
            player.y = 300;
            player.vY = 0;
            isGrounded = true;
            // Aligner la rotation au sol
            rotation = Math.round(rotation / 90) * 90;
        } else {
            rotation += 5; // Tourne dans les airs
        }

        // Gestion obstacles
        spawnObstacle();

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Dessin du sol
        ctx.fillStyle = "#0051b3";
        ctx.fillRect(0, 340, canvas.width, 60);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(-10, 340, canvas.width + 20, 2);

        // Dessin obstacles (Triangles/Spikes)
        ctx.fillStyle = "#eee";
        obstacles.forEach((obj, i) => {
            obj.x -= gameSpeed;
            
            ctx.beginPath();
            ctx.moveTo(obj.x, 340);
            ctx.lineTo(obj.x + obj.w / 2, 340 - obj.h);
            ctx.lineTo(obj.x + obj.w, 340);
            ctx.fill();

            // Collision précise
            if (player.x + player.size > obj.x + 5 && player.x < obj.x + obj.w - 5 && player.y + player.size > 340 - obj.h + 5) {
                gameOver();
            }

            if (obj.x < -100) obstacles.splice(i, 1);
        });

        // Dessin Joueur avec rotation
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(rotation * Math.PI / 180);
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = "black";
        ctx.lineWidth = 3;
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        // Yeux du cube
        ctx.fillStyle = "black";
        ctx.fillRect(5, -10, 5, 5);
        ctx.fillRect(5, 5, 5, 5);
        ctx.restore();

        distance += 0.1;
        scoreEl.innerText = Math.floor(distance) + "%";
        
        requestAnimationFrame(loop);
    }

    function gameOver() {
        gameActive = false;
        menu.style.display = "block";
        menu.querySelector('h1').innerText = "T'AS EXPLOSÉ !";
        menu.querySelector('button').innerText = "REESSAYER";
    }
</script>
</body>
</html>
